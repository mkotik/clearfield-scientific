<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ClearPoint Scientific">
  <rect width="64" height="64" rx="13" fill="#0B2545"/>
  <!-- crosshair registration ticks -->
  <g stroke="#1E6FD8" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="32" y1="8" x2="32" y2="16"/>
    <line x1="32" y1="48" x2="32" y2="56"/>
    <line x1="8" y1="32" x2="16" y2="32"/>
    <line x1="48" y1="32" x2="56" y2="32"/>
  </g>
  <!-- locating dot: ring + filled center -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#1E6FD8" stroke-width="4"/>
  <circle cx="32" cy="32" r="6.5" fill="#1E6FD8"/>
</svg>
